    <script>
    //Faça um algoritmo que calcule e escreva a média aritmética dos números inteiros entre 15 (inclusive) e 100 (inclusive).
        
    let soma = 0;
    let quantidade = 0;
    let contador = 15

    for (contador; contador <= 100; contador++) {
        soma = soma + contador
        quantidade = quantidade + 1
    }
    let media = soma / quantidade;
    console.log (media);
    

    
    
    </script>
